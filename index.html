<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starlink 星链轨道部署 · 3D 可视化</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#000;overflow:hidden;color:#e2e8f0;-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;inset:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none;top:0;left:0;right:0;padding:16px}
.ui>*{pointer-events:auto}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:28px;height:28px}
.logo h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,#fff,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{font-size:11px;color:#64748b;margin-top:1px}
.live{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:100px;font-size:11px;color:#10b981}
.dot{width:6px;height:6px;background:#10b981;border-radius:50%;animation:p 2s infinite}
@keyframes p{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.panels{position:fixed;z-index:10;bottom:16px;left:16px;display:flex;gap:10px;pointer-events:auto;flex-wrap:wrap}
.panel{background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;min-width:150px}
.panel .label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#475569;font-weight:600;margin-bottom:6px}
.panel .val{font-size:22px;font-weight:800;color:#fff}
.panel .val.cyan{color:#06b6d4}.panel .val.blue{color:#3b82f6}.panel .val.amber{color:#f59e0b}.panel .val.green{color:#10b981}.panel .val.purple{color:#a78bfa}
.panel .desc{font-size:10px;color:#475569;margin-top:4px}
.ctrl{position:fixed;z-index:10;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.ctrl button{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ctrl button:hover{background:rgba(30,41,59,0.9);color:#fff;border-color:rgba(255,255,255,0.15)}
.ctrl button.active{background:rgba(6,182,212,0.15);color:#06b6d4;border-color:rgba(6,182,212,0.3)}
.legend{position:fixed;z-index:10;top:70px;right:16px;pointer-events:auto}
.legend .item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:#94a3b8}
.legend .dot2{width:8px;height:8px;border-radius:50%}
.tip{position:fixed;z-index:20;background:rgba(15,23,42,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .2s;max-width:220px}
.tip.show{opacity:1}
.tip .name{font-weight:600;color:#fff;margin-bottom:3px}
.tip .info{color:#94a3b8;line-height:1.4}
#loading{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#loading.hide{opacity:0;pointer-events:none}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.05);border-top-color:#06b6d4;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:16px;color:#475569;font-size:13px}
@media(max-width:640px){.panels{bottom:70px;left:8px;right:8px}.panel{min-width:100px;padding:10px 12px}.panel .val{font-size:16px}.ctrl{bottom:8px;right:8px}.hdr{padding:8px}.legend{top:60px;right:8px}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>正在加载星链数据…</p></div>

<div class="ui">
<div class="hdr">
<div class="logo">
<svg viewBox="0 0 28 28"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs><circle cx="14" cy="14" r="13" fill="none" stroke="url(#g1)" stroke-width="1.5"/><circle cx="14" cy="14" r="5" fill="url(#g1)" opacity=".6"/><ellipse cx="14" cy="14" rx="12" ry="4" fill="none" stroke="url(#g1)" stroke-width=".8" opacity=".4" transform="rotate(-23 14 14)"/><ellipse cx="14" cy="14" rx="12" ry="4" fill="none" stroke="url(#g1)" stroke-width=".8" opacity=".4" transform="rotate(23 14 14)"/></svg>
<div><h1>Starlink 星链轨道部署</h1><div class="sub">SpaceX 低轨卫星星座 · 3D 实时可视化</div></div>
</div>
<div class="live"><div class="dot"></div>LIVE</div>
</div>
</div>

<div class="panels">
<div class="panel"><div class="label">在轨卫星</div><div class="val cyan" id="satCount">0</div><div class="desc">活跃运行中</div></div>
<div class="panel"><div class="label">轨道壳层</div><div class="val blue" id="shellCount">0</div><div class="desc">Orbital Shells</div></div>
<div class="panel"><div class="label">轨道高度</div><div class="val amber" id="altRange">-</div><div class="desc">km · 低地球轨道</div></div>
<div class="panel"><div class="label">覆盖面积</div><div class="val green" id="coverage">-</div><div class="desc">地球表面 %</div></div>
<div class="panel"><div class="label">设计总数</div><div class="val purple">42,000</div><div class="desc">Gen2 星座规划</div></div>
</div>

<div class="legend">
<div class="item"><div class="dot2" style="background:#38bdf8"></div>Shell 1 · 550km</div>
<div class="item"><div class="dot2" style="background:#818cf8"></div>Shell 2 · 540km</div>
<div class="item"><div class="dot2" style="background:#06b6d4"></div>Shell 3 · 570km</div>
<div class="item"><div class="dot2" style="background:#f472b6"></div>Shell 4 · 560km</div>
<div class="item"><div class="dot2" style="background:#a78bfa"></div>Shell 5 · 525km</div>
<div class="item"><div class="dot2" style="background:#fbbf24"></div>Gen2 · 340km</div>
</div>

<div class="ctrl">
<button id="btnRot" class="active" title="自动旋转">⟳</button>
<button id="btnGlow" class="active" title="大气层">◉</button>
<button id="btnOrbit" title="轨道线">◎</button>
<button id="btnTrails" title="卫星拖尾">☄</button>
<button id="btnReset" title="重置视角">⌂</button>
</div>

<div class="tip" id="tip"><div class="name"></div><div class="info"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PI=Math.PI,sin=Math.sin,cos=Math.cos,atan2=Math.atan2,sqrt=Math.sqrt,abs=Math.abs,min=Math.min,max=Math.max,pow=Math.pow;
const R_EARTH=1,DEG=PI/180;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.01,200);
camera.position.set(0,1.8,3.2);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(min(devicePixelRatio,2));
renderer.toneMapping=ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0x334466,0.6));
const sun=new THREE.DirectionalLight(0xffeedd,1.8);
sun.position.set(5,2,3);
scene.add(sun);

// Stars
const starGeo=new THREE.BufferGeometry();
const starVerts=[];
for(let i=0;i<6000;i++){const r=80+Math.random()*40;const th=Math.random()*PI*2;const ph=acos(2*Math.random()-1);starVerts.push(r*sin(ph)*cos(th),r*sin(ph)*sin(th),r*cos(ph));}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.08,sizeAttenuation:true})));

// Earth
const earthTexUrl='https://unpkg.com/three-globe@2.24.6/example/img/earth-blue-marble.jpg';
const bumpTexUrl='https://unpkg.com/three-globe@2.24.6/example/img/earth-topology.png';
const texLoader=new THREE.TextureLoader();
const earthMat=new THREE.MeshPhongMaterial({color:0x2233ff,shininess:25});
const earth=new THREE.Mesh(new THREE.SphereGeometry(R_EARTH,128,64),earthMat);
scene.add(earth);
texLoader.load(earthTexUrl,t=>{earthMat.map=t;earthMat.color.set(0xffffff);earthMat.needsUpdate=true;});
texLoader.load(bumpTexUrl,t=>{earthMat.bumpMap=t;earthMat.bumpScale=0.03;earthMat.needsUpdate=true;});

// Clouds
const cloudMat=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.15,depthWrite:false});
const clouds=new THREE.Mesh(new THREE.SphereGeometry(R_EARTH*1.008,64,32),cloudMat);
scene.add(clouds);

// Atmosphere glow
const atmosGeo=new THREE.SphereGeometry(R_EARTH*1.04,64,32);
const atmosMat=new THREE.ShaderMaterial({vertexShader:`varying vec3 vNormal;void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,fragmentShader:`varying vec3 vNormal;void main(){float intensity=pow(.65-dot(vNormal,vec3(0,0,1.)),2.5);gl_FragColor=vec4(.3,.6,1.,1.)*intensity;}`,blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true,depthWrite:false});
const atmos=new THREE.Mesh(atmosGeo,atmosMat);
scene.add(atmos);

// Starlink shells data (real deployment data 2024-2025)
const shells=[
 {name:'Shell 1',alt:550,inc:53,sats:1584,planes:72,satsPerPlane:22,color:0x38bdf8,gen:1,operational:true},
 {name:'Shell 2',alt:540,inc:53.2,sats:1584,planes:72,satsPerPlane:22,color:0x818cf8,gen:1,operational:true},
 {name:'Shell 3',alt:570,inc:70,sats:720,planes:36,satsPerPlane:20,color:0x06b6d4,gen:1,operational:true},
 {name:'Shell 4',alt:560,inc:97.6,sats:384,planes:6,satsPerPlane:64,color:0xf472b6,gen:1,polar:true,operational:true},
 {name:'Shell 5',alt:525,inc:53,sats:2547,planes:72,satsPerPlane:36,color:0xa78bfa,gen:2,operational:true},
 {name:'Gen2 LEO',alt:340,inc:53,sats:7500,planes:120,satsPerPlane:62,color:0xfbbf24,gen:2,planned:true},
];
const totalSats=shells.reduce((a,s)=>a+s.sats,0);
document.getElementById('satCount').textContent=totalSats.toLocaleString();
document.getElementById('shellCount').textContent=shells.length;
document.getElementById('altRange').textContent=`${Math.min(...shells.map(s=>s.alt))}–${Math.max(...shells.map(s=>s.alt))}`;
document.getElementById('coverage').textContent='~'+Math.round(totalSats/42000*100)+'%';

// Orbit lines
const orbitGroup=new THREE.Group();
scene.add(orbitGroup);
function makeOrbitRing(r,inc,color,opacity=0.08){
 const pts=[];for(let i=0;i<=360;i++){const a=i*DEG;pts.push(new THREE.Vector3(r*cos(a),r*sin(a)*cos(inc*DEG),r*sin(a)*sin(inc*DEG)));}
 const geo=new THREE.BufferGeometry().setFromPoints(pts);
 const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity,depthWrite:false});
 return new THREE.Line(geo,mat);
}
shells.forEach(sh=>{
 const r=R_EARTH+sh.alt/6371;
 const count=sh.polar?3:min(sh.planes,18);
 for(let i=0;i<count;i++){
  const ring=makeOrbitRing(r,sh.inc,sh.color,sh.planned?0.03:0.06);
  ring.rotation.y=i*PI/count;
  orbitGroup.add(ring);
 }
});
orbitGroup.visible=false;

// Satellite particles
const satGroup=new THREE.Group();
scene.add(satGroup);
const satGeoInst=new THREE.SphereGeometry(0.006,6,4);
const satMaterials=shells.map(sh=>new THREE.MeshBasicMaterial({color:sh.color}));
const allSats=[];
shells.forEach((sh,si)=>{
 const r=R_EARTH+sh.alt/6371;
 const count=sh.planned?min(sh.sats,300):sh.sats;
 for(let p=0;p<sh.planes;p++){
  const planeAngle=p*2*PI/sh.planes;
  const satsInPlane=sh.planned?min(sh.satsPerPlane,4):sh.satsPerPlane;
  for(let s=0;s<satsInPlane;s++){
   const satAngle=s*2*PI/satsInPlane+(p%2)*PI/satsInPlane;
   const mesh=new THREE.Mesh(satGeoInst,satMaterials[si]);
   const data={mesh,r,inc:sh.inc*DEG,planeAngle,satAngle,speed:0.02+Math.random()*0.005,shell:sh,idx:allSats.length};
   allSats.push(data);
   satGroup.add(mesh);
  }
 }
});
function updateSats(t){
 allSats.forEach(s=>{
  const a=s.satAngle+t*s.speed;
  const pa=s.planeAngle+t*s.speed*0.01;
  const x=s.r*cos(a);
  const y=s.r*sin(a)*cos(pa)*cos(s.inc)-s.r*sin(a)*sin(pa)*sin(s.inc);
  const z=s.r*sin(a)*cos(pa)*sin(s.inc)+s.r*sin(a)*sin(pa)*cos(s.inc);
  s.mesh.position.set(x,y,z);
  s.mesh.scale.setScalar(s.shell.planned?0.5:1);
  s.mesh.material.opacity=s.shell.planned?0.4:1;
 });
}

// Trails
const trailGroup=new THREE.Group();
scene.add(trailGroup);
const trailSats=allSats.filter((_,i)=>i%20===0);
const trailLines=[];
trailSats.forEach(s=>{
 const pts=new Array(40).fill(null).map(()=>new THREE.Vector3());
 const geo=new THREE.BufferGeometry().setFromPoints(pts);
 const mat=new THREE.LineBasicMaterial({color:s.shell.color,transparent:true,opacity:0.25,depthWrite:false});
 const line=new THREE.Line(geo,mat);
 trailGroup.add(line);
 trailLines.push({line,pts,data:s});
});
trailGroup.visible=false;
function updateTrails(t){
 trailLines.forEach(({line,pts,data:s})=>{
  for(let i=0;i<40;i++){
   const a=s.satAngle+t*s.speed-i*0.03;
   const pa=s.planeAngle+t*s.speed*0.01-i*0.001;
   const x=s.r*cos(a);
   const y=s.r*sin(a)*cos(pa)*cos(s.inc)-s.r*sin(a)*sin(pa)*sin(s.inc);
   const z=s.r*sin(a)*cos(pa)*sin(s.inc)+s.r*sin(a)*sin(pa)*cos(s.inc);
   pts[i].set(x,y,z);
  }
  line.geometry.setFromPoints(pts);
 });
}

// Mouse interaction
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hoveredSat=null;
const tip=document.getElementById('tip');
function onMouseMove(e){
 mouse.x=(e.clientX/innerWidth)*2-1;
 mouse.y=-(e.clientY/innerHeight)*2+1;
 raycaster.setFromCamera(mouse,camera);
 const hits=raycaster.intersectObjects(satGroup.children);
 if(hits.length>0){
  const hit=hits[0].object;
  const data=allSats.find(s=>s.mesh===hit);
  if(data){
   tip.querySelector('.name').textContent=data.shell.name;
   tip.querySelector('.info').textContent=`高度 ${data.shell.alt}km · 倾角 ${data.shell.inc}° · Gen${data.shell.gen}`;
   tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY-40+'px';
   tip.classList.add('show');document.body.style.cursor='pointer';return;
  }
 }
 tip.classList.remove('show');document.body.style.cursor='grab';
}
addEventListener('mousemove',onMouseMove);

// Camera controls
let isDown=false,px=0,py=0,theta=0.3,phi=1.2,dist=3.2;
let autoRotate=true;
document.body.style.cursor='grab';
addEventListener('mousedown',e=>{isDown=true;px=e.clientX;py=e.clientY;document.body.style.cursor='grabbing';});
addEventListener('mouseup',()=>{isDown=false;document.body.style.cursor='grab';});
addEventListener('mousemove',e=>{
 if(!isDown)return;
 const dx=(e.clientX-px)*0.005;const dy=(e.clientY-py)*0.005;
 theta-=dx;phi=max(0.1,min(PI-0.1,phi-dy));
 px=e.clientX;py=e.clientY;
});
addEventListener('wheel',e=>{dist=max(1.5,min(8,dist+e.deltaY*0.002));},{passive:true});
addEventListener('touchstart',e=>{isDown=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
addEventListener('touchmove',e=>{
 if(!isDown||e.touches.length!==1)return;
 const dx=(e.touches[0].clientX-px)*0.005;const dy=(e.touches[0].clientY-py)*0.005;
 theta-=dx;phi=max(0.1,min(PI-0.1,phi-dy));
 px=e.touches[0].clientX;py=e.touches[0].clientY;
},{passive:true});
addEventListener('touchend',()=>{isDown=false;});

// Buttons
const btnRot=document.getElementById('btnRot');
const btnGlow=document.getElementById('btnGlow');
const btnOrbit=document.getElementById('btnOrbit');
const btnTrails=document.getElementById('btnTrails');
const btnReset=document.getElementById('btnReset');
btnRot.onclick=()=>{autoRotate=!autoRotate;btnRot.classList.toggle('active',autoRotate);};
btnGlow.onclick=()=>{atmos.visible=!atmos.visible;btnGlow.classList.toggle('active',atmos.visible);};
btnOrbit.onclick=()=>{orbitGroup.visible=!orbitGroup.visible;btnOrbit.classList.toggle('active',orbitGroup.visible);};
btnTrails.onclick=()=>{trailGroup.visible=!trailGroup.visible;btnTrails.classList.toggle('active',trailGroup.visible);};
btnReset.onclick=()=>{theta=0.3;phi=1.2;dist=3.2;};

// Resize
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// Animate
let t0=performance.now();
function animate(){
 requestAnimationFrame(animate);
 const t=(performance.now()-t0)/1000;
 if(autoRotate&&!isDown)theta+=0.001;
 camera.position.x=dist*sin(phi)*sin(theta);
 camera.position.y=dist*cos(phi);
 camera.position.z=dist*sin(phi)*cos(theta);
 camera.lookAt(0,0,0);
 earth.rotation.y=t*0.01;
 clouds.rotation.y=t*0.015;
 updateSats(t);
 if(trailGroup.visible)updateTrails(t);
 renderer.render(scene,camera);
}
animate();

// Hide loading
setTimeout(()=>{document.getElementById('loading').classList.add('hide');},1500);
</script>
</body>
</html>
